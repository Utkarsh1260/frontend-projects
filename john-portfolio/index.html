<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="./animation.css" />
    <title>John's Portoflio</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>


    <main>
        <!-- side links  -->
        <div class="know-more">
            <a href="#">Podcast</a>
            <a href="#">Portfolio</a>
            <a href="#">Research</a>
            <a href="#">Clients</a>
        </div>

        <!-- left big portfolio-name  -->
        <div class="portfolio">
            <span class="corner port"></span>
            <h1>Portfolio</h1>
        </div>

        <div class="profile border">

            <!-- top left corner -->
            <div class="about-tag">
                <i class="ri-focus-2-line"></i>
                <p>About Me</p>
            </div>

            <!-- circle text animation-->
            <div class="circle">
                <div class="inner-circle"></div>
            </div>

            <!--john  image -->
            <img class="profile-img" src="./assets/images/john-daniel.png" alt="profile">

            <!-- intro -->
            <div class="intro">
                <h2>Im,</h2>
                <h1>Jon</h1>
                <h1>Daniel</h1>
            </div>

            <!-- email -->
            <div class="email">
                inquiry@jondaniel.design
                <i class="ri-mail-line"></i>

                <div class="line"></div>
            </div>

            <!-- badge -->
            <div class="badge">
                <div class="badge-inner"></div>
            </div>

        </div>

        <!-- flamingo  -->
        <div class="flamingo border">
            <span style="border-top: 2px solid white;
    border-right: 2px solid white;" class="corner"></span>

            <div class="video">
                <video class="fl-video" src="./assets/videos/wiz-khalifa-video.mp4"></video>
            </div>

            <button class="flamingo-play video-button"><i class="ri-play-large-fill"></i></button>
            <button class="flamingo-pause video-button"><i class="ri-pause-large-fill"></i></button>

        </div>


        <!-- projects-and-awards  -->
        <div class="projects-and-awards border">
            <div class="box1">
                <span class="corner"></span>
                <p>251</p>
                <h5>Projects</h5>
            </div>
            <div class="box2">
                <span class="corner"></span>
                <p>156</p>
                <h5>Awards</h5>
            </div>
        </div>
        <div class="clients border">
            <span style="border-top: 2px solid white;
    border-right: 2px solid white;" class="corner"></span>
            <i class="ri-apple-fill"></i>
            <p>Clients</p>
        </div>
        <div class="global-design border">
            <span class="corner"></span>
            <div class="sphere">
                <img src="./assets/images/spere2.png" alt="sphere">
            </div>
            <div class="no">
                <p>172</p>
                <h5>Global Design<br>Awards</h5>
            </div>
        </div>

    </main>


    <script src="script.js"></script>
</body>

</html>
